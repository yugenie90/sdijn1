<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>학원 업무 관리 시스템</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
</head>
<body class="landing-body">

  <div class="bg-grid"></div>

  <header class="main-header">
    <div class="header-inner">
      <div class="logo">
        <div class="logo-mark">A</div>
        <div class="logo-text-wrap">
          <span class="logo-title">학원 업무 관리</span>
          <span class="logo-sub">Academy Management System</span>
        </div>
      </div>
      <div class="header-right">
        <span class="header-date" id="currentDate"></span>
      </div>
    </div>
  </header>

  <main class="landing-main">
    <section class="hero">
      <p class="hero-eyebrow">업무 자동화 도구</p>
      <h1 class="hero-title">빠르고 정확한<br>학원 업무 처리</h1>
      <p class="hero-desc">반복적인 행정 업무를 스마트하게 처리하세요.</p>
    </section>

    <section class="features-section">
      <h2 class="section-label">기능 목록</h2>
      <div class="features-grid">

        <!-- 퇴원생 교재 정산 -->
        <a href="settlement.html" class="feature-card">
          <div class="card-accent"></div>
          <div class="card-header">
            <div class="card-icon-wrap">
              <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
                <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
                <line x1="9" y1="9" x2="15" y2="9"/>
                <line x1="9" y1="13" x2="13" y2="13"/>
              </svg>
            </div>
            <span class="card-status active">사용 가능</span>
          </div>
          <div class="card-body">
            <h3 class="card-title">퇴원생 교재 정산</h3>
            <p class="card-desc">퇴원 학생의 교재 배부 내역을 조회하고<br>환불 금액을 자동으로 계산합니다.</p>
          </div>
          <div class="card-footer">
            <span class="card-link">시작하기 <span class="arrow">→</span></span>
          </div>
        </a>

        <!-- Coming Soon 1 -->
        <div class="feature-card disabled">
          <div class="card-header">
            <div class="card-icon-wrap muted">
              <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                <line x1="3" y1="9" x2="21" y2="9"/>
                <line x1="3" y1="15" x2="21" y2="15"/>
                <line x1="9" y1="3" x2="9" y2="21"/>
              </svg>
            </div>
            <span class="card-status coming">준비중</span>
          </div>
          <div class="card-body">
            <h3 class="card-title muted">기능 추가 예정</h3>
            <p class="card-desc muted">새로운 업무 기능이 추가될 예정입니다.</p>
          </div>
        </div>

        <!-- Coming Soon 2 -->
        <div class="feature-card disabled">
          <div class="card-header">
            <div class="card-icon-wrap muted">
              <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                <circle cx="9" cy="7" r="4"/>
                <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
              </svg>
            </div>
            <span class="card-status coming">준비중</span>
          </div>
          <div class="card-body">
            <h3 class="card-title muted">기능 추가 예정</h3>
            <p class="card-desc muted">새로운 업무 기능이 추가될 예정입니다.</p>
          </div>
        </div>

      </div>
    </section>
  </main>

  <footer class="main-footer">
    <p>내부 업무용 시스템 · 무단 배포 금지</p>
  </footer>

  <script>
    const now = new Date();
    document.getElementById('currentDate').textContent =
      now.toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'short' });
  </script>
</body>
</html>
